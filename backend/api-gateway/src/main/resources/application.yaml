server:
  port: 8081
  
jwt:
  secret: 1f94a95c6b83a5d8df4c74b0d785f4787dfb4b16ddc9e0d7df4b8a15ef8b9f7c

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
          - id:  auth-service
            uri: lb://AUTH-SERVICE
            predicates:
            - Path=/api/v1/auth/**
            
          - id: user-service
            uri: lb://USER-SERVICE
            predicates:
            - Path=/api/v1/users/**
            
          - id: doctor-service
            uri: lb://DOCTOR-SERVICE
            predicates:
            - Path=/api/v1/doctors/** 
            
          - id: appointment-service
            uri: lb://APPOINTMENT-SERVICE
            predicates:
            - Path=/api/v1/appointments/**
            
          - id: queue-service
            uri: lb://QUEUE-SERVICE
            predicates:
            - Path=/api/v1/queue/**
              
            
              
              
              
          

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
        
        
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.security: DEBUG