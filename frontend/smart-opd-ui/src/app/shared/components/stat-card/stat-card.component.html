<div class="card stat-card shadow-sm">

    <div class="card-body">

        <div class="stat-left">

            <h6>{{title}}</h6>

            <h2>{{value}}</h2>

        </div>

        <div class="stat-right">

            <i
              class="fa-solid {{icon}} text-{{color}}">
            </i>

        </div>

    </div>

</div>
