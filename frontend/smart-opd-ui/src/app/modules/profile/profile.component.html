<div class="container-fluid">

    <h2 class="mb-4">
        My Profile
    </h2>

    <div class="card shadow-sm">

        <div class="card-body">

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        First Name
                    </label>

                    <input
                        class="form-control"
                        [value]="user?.firstName"
                        readonly>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Last Name
                    </label>

                    <input
                        class="form-control"
                        [value]="user?.lastName"
                        readonly>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    <input
                        class="form-control"
                        [value]="user?.email"
                        readonly>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Mobile
                    </label>

                    <input
                        class="form-control"
                        [value]="user?.mobile"
                        readonly>

                </div>

            </div>

        </div>

    </div>

</div>
