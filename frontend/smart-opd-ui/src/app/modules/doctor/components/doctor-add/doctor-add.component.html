<div class="card">
  <div class="card-header">
    <h3>Add Doctor</h3>
  </div>

  <div class="card-body">
    <form [formGroup]="doctorForm" (ngSubmit)="saveDoctor()">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label>User ID</label>
          <input class="form-control" formControlName="userId">
        </div>

        <div class="col-md-6 mb-3">
          <label>Registration Number</label>
          <input class="form-control" formControlName="registrationNumber">
        </div>

        <div class="col-md-6 mb-3">
          <label>Specialization</label>
          <input class="form-control" formControlName="specialization">
        </div>

        <div class="col-md-6 mb-3">
          <label>Qualification</label>
          <input class="form-control" formControlName="qualification">
        </div>

        <div class="col-md-6 mb-3">
          <label>Experience</label>
          <input type="number" class="form-control" formControlName="experience">
        </div>

        <div class="col-md-6 mb-3">
          <label>Department</label>
          <input class="form-control" formControlName="department">
        </div>

        <div class="col-md-6 mb-3">
          <label>Consultation Fee</label>
          <input type="number" class="form-control" formControlName="consultationFee">
        </div>

        <div class="col-md-6 mb-3">
          <label>Status</label>
          <select class="form-select" formControlName="active">
            <option [ngValue]="true">Active</option>
            <option [ngValue]="false">Inactive</option>
          </select>
        </div>
      </div>

      <button class="btn btn-primary">Save Doctor</button>
    </form>
  </div>
</div>
