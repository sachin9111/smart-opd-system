<div class="container-fluid login-page">

  <div class="row h-100">

    <div class="col-lg-7 d-none d-lg-flex branding-panel">
      <div class="branding-content">
        <h1>Smart OPD</h1>
        <h4>Password Recovery</h4>
        <p>Enter your registered email address to receive a password reset OTP.</p>
      </div>
    </div>

    <div class="col-lg-5 login-panel">

      <div class="login-card">

        <h2 class="text-center mb-2">Forgot Password</h2>

        <p class="text-center text-muted mb-4">
          We'll send you an OTP to reset your password.
        </p>

        <form [formGroup]="forgotForm" (ngSubmit)="sendOtp()">

          <div class="mb-4">

            <label class="form-label">
              Email Address
            </label>

            <input
              type="email"
              class="form-control"
              formControlName="email"
              placeholder="Enter your email">

            <small
              class="text-danger"
              *ngIf="f.email.touched && f.email.invalid">
              Please enter a valid email address.
            </small>

          </div>

          <button
            class="btn btn-primary w-100"
            [disabled]="loading">

            <span *ngIf="!loading">
              Send OTP
            </span>

            <span *ngIf="loading">
              <span class="spinner-border spinner-border-sm me-2"></span>
              Sending...
            </span>

          </button>

        </form>

        <hr>

        <div class="text-center">

          <a routerLink="/login">
            Back to Login
          </a>

        </div>

      </div>

    </div>

  </div>

</div>
