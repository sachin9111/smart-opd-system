<div class="container-fluid login-page">

  <div class="row h-100">

    <div class="col-lg-7 d-none d-lg-flex branding-panel">
      <div class="branding-content">
        <h1>Smart OPD</h1>
        <h4>Reset Password</h4>
        <p>Create a new password for your account.</p>
      </div>
    </div>

    <div class="col-lg-5 login-panel">

      <div class="login-card">

        <h2 class="text-center mb-2">Reset Password</h2>

        <p class="text-center text-muted mb-4">
          Enter your email and new password.
        </p>

        <form [formGroup]="resetForm" (ngSubmit)="resetPassword()">

          <div class="mb-3">
            <label class="form-label">Email</label>

            <input
              type="email"
              class="form-control"
              formControlName="email"
              placeholder="Enter Email">

            <small class="text-danger"
              *ngIf="f['email'].touched && f['email'].invalid">
              Valid email is required.
            </small>
          </div>

          <div class="mb-3">
            <label class="form-label">New Password</label>

            <div class="input-group">

              <input
                [type]="hidePassword ? 'password' : 'text'"
                class="form-control"
                formControlName="password"
                placeholder="New Password">

              <button
                class="btn btn-outline-secondary"
                type="button"
                (click)="togglePassword()">

                <i class="fa-solid"
                  [ngClass]="hidePassword ? 'fa-eye' : 'fa-eye-slash'">
                </i>

              </button>

            </div>

            <small class="text-danger"
              *ngIf="f['password'].touched && f['password'].invalid">
              Password must be at least 8 characters.
            </small>

          </div>

          <div class="mb-4">
            <label class="form-label">Confirm Password</label>

            <div class="input-group">

              <input
                [type]="hideConfirmPassword ? 'password' : 'text'"
                class="form-control"
                formControlName="confirmPassword"
                placeholder="Confirm Password">

              <button
                class="btn btn-outline-secondary"
                type="button"
                (click)="toggleConfirmPassword()">

                <i class="fa-solid"
                  [ngClass]="hideConfirmPassword ? 'fa-eye' : 'fa-eye-slash'">
                </i>

              </button>

            </div>

          </div>

          <button
            class="btn btn-primary w-100"
            [disabled]="loading">

            <span *ngIf="!loading">
              Reset Password
            </span>

            <span *ngIf="loading">
              <span class="spinner-border spinner-border-sm me-2"></span>
              Updating...
            </span>

          </button>

        </form>

        <hr>

        <div class="text-center">
          <a routerLink="/login">Back to Login</a>
        </div>

      </div>

    </div>

  </div>

</div>
