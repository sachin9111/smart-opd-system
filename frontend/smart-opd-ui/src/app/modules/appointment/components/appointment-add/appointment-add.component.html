<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-header">

                    <h4 class="mb-0">

                        Book Appointment

                    </h4>

                </div>

                <div class="card-body">

                    <form
                        [formGroup]="appointmentForm"
                        (ngSubmit)="save()">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Doctor

                                </label>

                                <select
                                    class="form-select"
                                    formControlName="doctorId">

                                    <option value="">

                                        Select Doctor

                                    </option>

                                    <option
                                        *ngFor="let doctor of doctors"
                                        [value]="doctor.id">

                                        {{doctor.id}}

                                    </option>

                                </select>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Appointment Date

                                </label>

                                <input
                                    type="date"
                                    class="form-control"
                                    formControlName="appointmentDate">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Appointment Time

                                </label>

                                <input
                                    type="time"
                                    class="form-control"
                                    formControlName="appointmentTime">

                            </div>

                            <div class="col-md-12 mb-3">

                                <label class="form-label">

                                    Reason

                                </label>

                                <textarea
                                    rows="4"
                                    class="form-control"
                                    formControlName="reason">

                                </textarea>

                            </div>

                        </div>

                        <div class="text-end">

                            <a
                                routerLink="/appointments"
                                class="btn btn-secondary me-2">

                                Cancel

                            </a>

                            <button
                                class="btn btn-primary"
                                [disabled]="saving">

                                <span
                                    *ngIf="saving"
                                    class="spinner-border spinner-border-sm me-2">

                                </span>

                                Save Appointment

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
