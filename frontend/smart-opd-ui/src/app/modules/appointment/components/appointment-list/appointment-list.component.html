<div class="card shadow-sm border-0">

    <div class="card-header bg-white">

        <div class="d-flex justify-content-between align-items-center">

            <div>

                <h4 class="mb-0">

                    Appointments

                </h4>

                <small class="text-muted">

                    Manage hospital appointments

                </small>

            </div>

            <a
                routerLink="/appointments/add"
                class="btn btn-primary">

                <i class="fa-solid fa-plus me-2"></i>

                Book Appointment

            </a>

        </div>

    </div>

    <div class="card-body">

        <div class="row mb-3">

            <div class="col-md-4">

                <input
                    type="text"
                    class="form-control"
                    placeholder="Search..."
                    [(ngModel)]="searchText"
                    (keyup)="search()">

            </div>

        </div>

        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead>

                    <tr>

                        <th>#</th>

                        <th>Doctor</th>

                        <th>Date</th>

                        <th>Time</th>

                        <th>Token</th>

                        <th>Status</th>

                        <th width="150">

                            Action

                        </th>

                    </tr>

                </thead>

                <tbody>

                    <tr *ngFor="let item of filteredAppointments; let i=index">

                        <td>{{i+1}}</td>

                        <td>

                            Doctor {{item.doctorId}}

                        </td>

                        <td>

                            {{item.appointmentDate}}

                        </td>

                        <td>

                            {{item.appointmentTime}}

                        </td>

                        <td>

                            {{item.tokenNumber}}

                        </td>

                        <td>

                            <span
                                class="badge"

                                [ngClass]="{

                                'bg-success':item.status=='BOOKED',

                                'bg-warning':item.status=='PENDING',

                                'bg-danger':item.status=='CANCELLED',

                                'bg-primary':item.status=='COMPLETED'

                            }">

                                {{item.status}}

                            </span>

                        </td>

                        <td>

                            <a

                                [routerLink]="['/appointments/view',item.id]"

                                class="btn btn-sm btn-outline-info me-2">

                                <i class="fa-solid fa-eye"></i>

                            </a>

                            <button

                                class="btn btn-sm btn-outline-danger"

                                (click)="cancelAppointment(item.id!)">

                                <i class="fa-solid fa-trash"></i>

                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
