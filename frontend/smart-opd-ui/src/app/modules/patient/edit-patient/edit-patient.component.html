<div class="card">
    <div class="card-header">
        <h3>Edit Patient</h3>
    </div>
    <div class="card-body">
        <form [formGroup]="patientForm">
            <div class="mb-3">
                <label>User</label>
                <select class="form-select" formControlName="userId">
                    <option value="">Select User</option>
                    <option *ngFor="let user of users" [value]="user.id">
                        {{user.firstName}} {{user.lastName}} - {{user.email}}
                    </option>
                </select>
            </div>
            <div class="mb-3">
                <label>Blood Group</label>
                <select class="form-select" formControlName="bloodGroup">

                    <option value="">Select Blood Group</option>

                    <option value="A+">A+</option>
                    <option value="A-">A-</option>

                    <option value="B+">B+</option>
                    <option value="B-">B-</option>

                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>

                    <option value="O+">O+</option>
                    <option value="O-">O-</option>

                </select>
            </div>
            <div class="mb-3">
                <label>Height</label>
                <input type="number" class="form-control" formControlName="height">
            </div>
            <div class="mb-3">
                <label>Weight</label>
                <input type="number" class="form-control" formControlName="weight">
            </div>
            <div class="mb-3">
                <label>Allergies</label>
                <textarea class="form-control" formControlName="allergies"></textarea>
            </div>
            <div class="mb-3">
                <label>Medical History</label>
                <textarea class="form-control" formControlName="medicalHistory"></textarea>
            </div>
            <div class="mb-3">
                <label>Emergency Contact Name</label>
                <input class="form-control" formControlName="emergencyContactName">
            </div>
            <div class="mb-3">
                <label>Emergency Contact Number</label>
                <input class="form-control" formControlName="emergencyContactNumber">
            </div>
            <div class="mb-3">
                <label>Insurance Number</label>
                <input class="form-control" formControlName="insuranceNumber">
            </div>
            <button type="button" class="btn btn-primary" (click)="update()">Save</button>
        </form>
    </div>
</div>
