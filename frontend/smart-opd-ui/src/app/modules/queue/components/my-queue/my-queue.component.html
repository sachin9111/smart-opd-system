<div class="container-fluid">
    <h3 class="mb-4">My Queue</h3>

    <div class="row justify-content-center">
        <div class="col-md-3">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h6>Your Token</h6>
                    <h1 class="text-primary">{{queue?.tokenNumber}}</h1>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h6>Status</h6>
                    <h2>
                        <span class="badge bg-warning">{{queue?.status}}</span>
                    </h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h6>Patients Ahead</h6>
                    <h1>{{getPatientsAhead()}}</h1>
                </div>
            </div>
        </div>
    </div>

    <div class="card mt-4 shadow-sm">
        <div class="card-header">Appointment Details</div>
        <div class="card-body">
            <table class="table">
                <tr>
                    <th>Date</th>
                    <td>{{queue?.appointmentDate}}</td>
                </tr>
                <tr>
                    <th>Doctor</th>
                    <td>{{queue?.doctorId}}</td>
                </tr>
                <tr>
                    <th>Token</th>
                    <td>{{queue?.tokenNumber}}</td>
                </tr>
                <tr>
                    <th>Status</th>
                    <td>{{queue?.status}}</td>
                </tr>
            </table>
        </div>
    </div>
</div>
