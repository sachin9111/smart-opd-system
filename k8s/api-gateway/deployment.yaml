apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-gateway
  namespace: smart-opd

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api-gateway

  template:

    metadata:
      labels:
        app: api-gateway

    spec:

      containers:

      - name: api-gateway

        image: sachin9111/api-gateway:latest

        imagePullPolicy: Always

        ports:

        - containerPort: 8081