services:
  jenkins:
    build: .
    container_name: jenkins
    restart: unless-stopped
    privileged: true
    user: root

    ports:
      - "8088:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - default
      - smartopd

volumes:
  jenkins_home:

networks:
  smartopd:
    external: true
    name: docker_default